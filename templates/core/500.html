{% extends 'base.html' %}
{% load static %}

{% block title %}500 - Server Error{% endblock %}
{% block body_class %}error-page{% endblock %}

{% block content %}
<div class="error-wrapper">
    <div class="error-content text-center">
        <h1 class="error-code">500</h1>
        <h3 class="fw-bold mb-2">Internal Server Error</h3>
        <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
        <a href="{% url 'dashboard:home' %}" class="btn btn-primary btn-animated">
            <i class="bi bi-house me-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
